name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  build:
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GITHUB_REPOSITORY
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH_ADMIN }}"
            cd "$DEPLOY_PATH"

            # Login to GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u avirgili-eclub --password-stdin

            # Pull latest image
            docker pull ghcr.io/$GITHUB_REPOSITORY:main

            # Tag as dev-current
            docker tag ghcr.io/${{ github.repository }}:main ghcr.io/${{ github.repository }}:dev-current

            # Restart frontend container
            docker compose -f docker-compose.dev.yml up -d --no-deps agendateya-admin

            # Health check (30 attempts, 2s apart = 60s max)
            echo "Waiting for frontend to be healthy..."
            for i in $(seq 1 30); do
              if docker exec agendateya-admin-dev wget --no-verbose --tries=1 --spider http://localhost/health 2>/dev/null; then
                echo "Frontend is healthy!"
                exit 0
              fi
              echo "Attempt $i/30..."
              sleep 2
            done

            echo "Health check failed!"
            docker logs agendateya-admin-dev --tail 50
            exit 1
