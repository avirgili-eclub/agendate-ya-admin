services:
  agendateya-admin:
    image: ghcr.io/${GITHUB_REPO:-your-org/agendate-ya-admin}:dev-current
    container_name: agendateya-admin-dev
    labels:
      - traefik.enable=true
      # HTTPS router — catch-all for the host (lower priority than backend API)
      - traefik.http.routers.agendateya-admin-dev.rule=Host(`${ADMIN_HOST}`)
      - traefik.http.routers.agendateya-admin-dev.entrypoints=websecure
      - traefik.http.routers.agendateya-admin-dev.tls=true
      - traefik.http.routers.agendateya-admin-dev.tls.certresolver=letsencrypt
      - traefik.http.services.agendateya-admin-dev.loadbalancer.server.port=80
      # HTTP → HTTPS redirect
      - traefik.http.routers.agendateya-admin-dev-http.rule=Host(`${ADMIN_HOST}`)
      - traefik.http.routers.agendateya-admin-dev-http.entrypoints=web
      - traefik.http.routers.agendateya-admin-dev-http.middlewares=redirect-to-https-admin
      - traefik.http.middlewares.redirect-to-https-admin.redirectscheme.scheme=https
      - traefik.http.middlewares.redirect-to-https-admin.redirectscheme.permanent=true
      - traefik.docker.network=alva-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    networks:
      - alva-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m

networks:
  alva-network:
    external: true
